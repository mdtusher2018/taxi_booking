name: Flutter - Android Build (Flavors - Unsigned)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # ☕ Setup Java
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      # 🐦 Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 📦 Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 🧱 Build USER APK (unsigned)
      - name: Build User APK
        run: flutter build apk --flavor user --debug --dart-define=APP_ROLE=user

      # 📦 Build USER AAB (unsigned)
      - name: Build User AAB
        run: flutter build appbundle --flavor user --debug --dart-define=APP_ROLE=user

      # 🧱 Build DRIVER APK (unsigned)
      - name: Build Driver APK
        run: flutter build apk --flavor driver --debug --dart-define=APP_ROLE=driver

      # 📦 Build DRIVER AAB (unsigned)
      - name: Build Driver AAB
        run: flutter build appbundle --flavor driver --debug --dart-define=APP_ROLE=driver

      # 📤 Upload USER APK
      - name: Upload User APK
        uses: actions/upload-artifact@v4
        with:
          name: user-apk
          path: build/app/outputs/flutter-apk/app-user-debug.apk

      # 📤 Upload USER AAB
      - name: Upload User AAB
        uses: actions/upload-artifact@v4
        with:
          name: user-aab
          path: build/app/outputs/bundle/userDebug/app-user-debug.aab

      # 📤 Upload DRIVER APK
      - name: Upload Driver APK
        uses: actions/upload-artifact@v4
        with:
          name: driver-apk
          path: build/app/outputs/flutter-apk/app-driver-debug.apk

      # 📤 Upload DRIVER AAB
      - name: Upload Driver AAB
        uses: actions/upload-artifact@v4
        with:
          name: driver-aab
          path: build/app/outputs/bundle/driverDebug/app-driver-debug.aab