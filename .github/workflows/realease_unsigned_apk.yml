name: Flutter - Android Build (Release - Debug Signed)

on:
  push:
    branches: ["dev"]
  pull_request:
    branches: ["dev"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # ☕ Setup Java
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      # 🐦 Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 📦 Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 🧱 Build USER APK (release behavior, debug signed)
      - name: Build User APK
        run: flutter build apk --flavor user --release --dart-define=APP_ROLE=user

      # 🧱 Build DRIVER APK
      - name: Build Driver APK
        run: flutter build apk --flavor driver --release --dart-define=APP_ROLE=driver

      # 📤 Upload USER APK
      - name: Upload User APK
        uses: actions/upload-artifact@v4
        with:
          name: user-apk
          path: build/app/outputs/flutter-apk/app-user-release.apk

      # 📤 Upload DRIVER APK
      - name: Upload Driver APK
        uses: actions/upload-artifact@v4
        with:
          name: driver-apk
          path: build/app/outputs/flutter-apk/app-driver-release.apk