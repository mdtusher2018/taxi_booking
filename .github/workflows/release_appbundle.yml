name: Flutter - Android Build (Flavors + Signed)

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 📥 Checkout repo
      - name: Checkout repository
        uses: actions/checkout@v4

      # ☕ Setup Java
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      # 🐦 Setup Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 📦 Install dependencies
      - name: Install dependencies
        run: flutter pub get

      # 🔐 Decode keystore
      - name: Decode Keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/keystore.jks

      # 🔐 Decode key.properties
      - name: Decode key.properties
        run: echo "${{ secrets.KEY_PROPERTIES_BASE64 }}" | base64 --decode > android/key.properties

      # 🧱 Build USER APK
      - name: Build User APK
        run: flutter build apk --flavor user --release --dart-define=APP_ROLE=user

      # 📦 Build USER AAB
      - name: Build User App Bundle
        run: flutter build appbundle --flavor user --release --dart-define=APP_ROLE=user

      # 🧱 Build DRIVER APK
      - name: Build Driver APK
        run: flutter build apk --flavor driver --release --dart-define=APP_ROLE=driver

      # 📦 Build DRIVER AAB
      - name: Build Driver App Bundle
        run: flutter build appbundle --flavor driver --release --dart-define=APP_ROLE=driver

      # 📤 Upload USER APK
      - name: Upload User APK
        uses: actions/upload-artifact@v4
        with:
          name: user-apk
          path: build/app/outputs/flutter-apk/app-user-release.apk

      # 📤 Upload USER AAB
      - name: Upload User AAB
        uses: actions/upload-artifact@v4
        with:
          name: user-aab
          path: build/app/outputs/bundle/userRelease/app-user-release.aab

      # 📤 Upload DRIVER APK
      - name: Upload Driver APK
        uses: actions/upload-artifact@v4
        with:
          name: driver-apk
          path: build/app/outputs/flutter-apk/app-driver-release.apk

      # 📤 Upload DRIVER AAB
      - name: Upload Driver AAB
        uses: actions/upload-artifact@v4
        with:
          name: driver-aab
          path: build/app/outputs/bundle/driverRelease/app-driver-release.aab